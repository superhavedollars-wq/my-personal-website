<h1>⚠️ 人机协作避坑准则</h1>

<h2>规避理解错觉</h2>
<ul>
<li>我能否脱离 AI，用自己的语言复述这套方法？</li>
<li>这套方法是否适配我的真实状态？</li>
</ul>

<h2>低水平使用 AI</h2>
<p>直接让 AI 替我做完整规划，放任 AI 编造完美外向人设，放弃自我判断。</p>

<h2>高水平使用 AI</h2>
<p>先用追问梳理真实自我素材，AI 只提供备选方案，最终由我筛选和判断。</p>
