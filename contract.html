<h1>📜 个人 AI 协作契约</h1>

<ol>
<li>AI 主要帮助我辅助完成工作，作为信息辅助和思路拓展伙伴。</li>
<li>AI 不替我决定是否参与集体社交、未来学业方向、人际模式、情绪调节方案和长期人生选择。</li>
<li>AI 输出内容后，我必须检查是否贴合真实心理状态。</li>
<li>AI 与我沟通时应简洁直白，减少空洞鸡汤。</li>
<li>最终所有选择和责任由我本人承担，AI 仅提供参考素材。</li>
</ol>
